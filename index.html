<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>зІӨиҜӯеӯҰд№ еҠ©жүӢ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#4A90D9;--primary-dark:#357ABD;--bg:#f5f7fa;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;--border:#e0e4e8;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08);--tile-bg:#eef3f9;--tile-hover:#d0e1f7;--tile-active:#4A90D9;--tile-text:#2c3e50;--danger:#e74c3c;--success:#27ae60}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-tap-highlight-color:transparent}
.container{max-width:720px;margin:0 auto;padding:12px}
.header{text-align:center;padding:16px 0 8px}
.header h1{font-size:1.5rem;font-weight:700;color:var(--primary)}
.header p{font-size:.85rem;color:var(--text-light);margin-top:2px}
.header .brand{font-size:.75rem;color:#8892a3;margin-top:8px;letter-spacing:1px}
.header .brand span{display:inline-block;padding:3px 14px;border:1px solid #d0d8e4;border-radius:20px;background:#f0f4fa}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.input-section textarea{width:100%;min-height:120px;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:.95rem;line-height:1.6;resize:vertical;transition:border-color .2s;font-family:inherit}
.input-section textarea:focus{outline:none;border-color:var(--primary)}
.char-count{font-size:.8rem;color:var(--text-light);text-align:right;margin-top:4px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-danger{background:transparent;color:var(--danger);border:2px solid var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{padding:6px 12px;font-size:.8rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
.speed-control{display:flex;align-items:center;gap:8px;margin-left:auto;font-size:.85rem}
.speed-control input[type=range]{width:100px;accent-color:var(--primary);height:4px;cursor:pointer}
.speed-control .speed-label{min-width:48px;text-align:center;font-weight:600;color:var(--primary)}
.controls-row{display:flex;flex-wrap:wrap;gap:6px 12px;align-items:center;margin-top:8px;font-size:.8rem}
.controls-row label{display:flex;align-items:center;gap:4px;white-space:nowrap}
.controls-row select{padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;background:var(--card);max-width:170px;color:var(--text)}
.range-wrap{display:flex;align-items:center;gap:4px}
.range-wrap input[type=range]{width:64px;height:4px;accent-color:var(--primary)}
.range-wrap .rv{min-width:28px;text-align:center;font-weight:600;color:var(--primary);font-size:.78rem}
.segments-wrapper{min-height:60px}
.sgroup{margin-bottom:10px;border-left:3px solid var(--primary);padding-left:10px;border-radius:0 8px 8px 0;transition:background .15s,border-color .15s}
.sgroup.active{border-left-color:var(--tile-active);background:#f0f4fc}
.shdr{padding:6px 8px;cursor:pointer;font-size:var(--seg-size,1.15rem);font-weight:600;color:var(--primary);border-radius:6px;transition:background .12s;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.shdr:hover{background:var(--tile-bg)}
.shdr:active,.shdr.playing{background:var(--tile-active);color:#fff}
.stiles{display:flex;flex-wrap:wrap;gap:4px;padding:4px 8px 8px}
.segment{display:inline-block;padding:6px 10px;border-radius:6px;background:var(--tile-bg);color:var(--tile-text);cursor:pointer;transition:all .12s;touch-action:manipulation;-webkit-user-select:none;user-select:none;border:1px solid transparent;word-break:keep-all;font-size:var(--seg-size,1.15rem)}
.segment:hover{background:var(--tile-hover)}
.segment:active,.segment.playing{background:var(--tile-active);color:#fff;border-color:var(--tile-active);transform:scale(.95)}
.segment.word{font-weight:600;background:#e0eaf8;border-color:#b0c8e8}
.segment.word:active,.segment.word.playing{background:var(--tile-active);color:#fff;border-color:var(--tile-active)}
.segment.punct{cursor:default;color:var(--text-light);background:transparent;padding:6px 4px;border-color:transparent}
.segment.space{cursor:default;background:transparent;min-width:10px;border-color:transparent}
.jp{display:block;font-size:.5rem;color:#aab3c5;line-height:1.15;margin-top:1px;font-family:Arial,sans-serif;letter-spacing:0;font-weight:400}
.jp .miss{color:#d0d6e0;font-style:italic}
.segment.word .jp,.segment.char .jp{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.placeholder-text{color:var(--text-light);font-size:.9rem;text-align:center;padding:24px 0}
.status-bar{font-size:.8rem;color:var(--text-light);margin-top:8px;min-height:1.2em;transition:opacity .3s}
.footer{display:flex;gap:8px;justify-content:center;padding:8px 0 20px}
.history-list{max-height:300px;overflow-y:auto}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
.history-item:last-child{border-bottom:none}
.history-item .text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.85rem}
.history-item .time{font-size:.75rem;color:var(--text-light);white-space:nowrap}
.history-item .btn{padding:4px 8px;font-size:.75rem}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:8px;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:500px;max-height:80vh;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:1.1rem}
.modal-header .btn-close{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:0 4px;color:var(--text-light);line-height:1}
.modal-body{padding:16px;overflow-y:auto;max-height:calc(80vh - 60px)}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);text-align:right}
@media(max-width:480px){.container{padding:8px}.card{padding:12px}.header h1{font-size:1.25rem}.segment{padding:5px 8px}.toolbar{gap:6px}.btn{padding:8px 10px;font-size:.82rem}.speed-control input[type=range]{width:68px}.controls-row{gap:4px 8px;font-size:.75rem}.controls-row select{max-width:130px;font-size:.75rem}.range-wrap input[type=range]{width:48px}}
</style>
</head>

<div class="container">
  <div class="header">
    <h1>рҹ—Ј зІӨиҜӯеӯҰд№ еҠ©жүӢ</h1>
    <p>зІҳиҙҙж–Үжң¬ В· зӮ№еҮ»еҸ‘йҹі В· еӯҰд№ зІӨиҜӯ</p>
    <div class="brand"><span>е”Ҝзҡ“ В· зІӨиҜӯеӯҰд№ </span></div>
  </div>
  <div class="card input-section">
    <textarea id="inputText" placeholder="еңЁжӯӨзІҳиҙҙжӯҢиҜҚжҲ–ж–Үжң¬...&#10;дҫӢеҰӮпјҡ&#10;еҺҹи°…жҲ‘иҝҷдёҖз”ҹдёҚзҫҒж”ҫзәөзҲұиҮӘз”ұ&#10;д№ҹдјҡжҖ•жңүдёҖеӨ©дјҡи·ҢеҖ’"></textarea>

      <div class="speed-control">

    </div>
    <div class="controls-row">

      <label>рҹ”Ө <div class="range-wrap">

      </div></label>
      <label style="cursor:pointer;user-select:none"><input type="checkbox" id="jpToggle"> зІӨжӢј</label>
    </div>
  </div>
  <div class="card">
    <div class="segments-wrapper">
      <div class="segments" id="segmentsContainer">
        <div class="placeholder-text">рҹ‘Ҷ еңЁдёҠж–№иҫ“е…Ҙж–Үжң¬пјҢзӮ№еҮ»гҖҢиҪ¬зҷҪиҜқгҖҚжҲ–зӣҙжҺҘејҖе§ӢеӯҰд№ </div>
      </div>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>
  <div class="footer">
    <button class="btn btn-outline btn-sm" id="clearBtn">рҹ—‘ жё…з©ә</button>
    <button class="btn btn-outline btn-sm" id="historyBtn">рҹ“ң еҺҶеҸІ</button>
  </div>
</div>
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <div class="modal-header"><h3>рҹ“ң еҺҶеҸІи®°еҪ•</h3><button class="btn-close" id="closeHistoryBtn">вң•</button></div>
    <div class="modal-body"><div id="historyList" class="history-list"><div class="placeholder-text">жҡӮж— и®°еҪ•</div></div></div>
    <div class="modal-footer"><button class="btn btn-danger btn-sm" id="clearHistoryBtn">жё…з©әеҺҶеҸІ</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

function getJyutping(words) {
  const result = [];
  for (const w of words) {
    if (w.type === 'punct' || w.type === 'space') { result.push(''); continue; }
    const text = w.text;
    if (jpWords[text]) { result.push(jpWords[text]); }
    else {
      const pins = [];
      for (const ch of text) {
        pins.push(jyutpingMap.get(ch) || '');
      }
      result.push(pins.join(' '));
    }
  }
  return result;
}

function getJyutpingForWord(w) {
  if (w.type === 'punct' || w.type === 'space') return '';
  const text = w.text;
  if (jpWords[text]) return jpWords[text];
  const pins = [];
  let missing = false;
  for (const ch of text) {
    const j = jyutpingMap.get(ch);
    if (j) pins.push(j);
    else { pins.push('?'); missing = true; }
  }
  return pins.join(' ') || (missing ? '?' : '');
}

  for (const w of extras.split(/\s+/)) {
    if (w && /[\u4e00-\u9fff]/.test(w)) segWords.add(w);

function segmentTextFallback(text) {
  const segs = [];
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (/\s/.test(ch)) { segs.push({ text: ch, type: 'space' }); i++; continue; }
    if (/[пјҢгҖӮпјҒпјҹгҖҒпјӣпјҡ""''пјҲпјүгҖҗгҖ‘гҖҠгҖӢвҖ”вҖҰВ·,.!?;:\'"()\[\]{}<>@#$%^&*+\-=/\\|~`]/.test(ch)) {
      segs.push({ text: ch, type: 'punct' }); i++; continue;
    }
    let matched = false;
    for (let len = 4; len >= 2; len--) {
      if (i + len <= text.length) {
        const w = text.slice(i, i + len);
        if (segWords.has(w)) {
          segs.push({ text: w, type: 'word' });
          i += len; matched = true; break;
        }
      }
    }
    if (!matched) { segs.push({ text: ch, type: 'char' }); i++; }
  }
  return segs;
}

async function resolveVoice() {
  if (!selectedVoiceURI) return await getCantoneseVoice();
  const voices = speechSynthesis.getVoices();
  return voices.find(v => v.uri === selectedVoiceURI || v.name === selectedVoiceURI) || null;
}

function getCantoneseVoice() {
  return new Promise(resolve => {
    let v = speechSynthesis.getVoices();
    if (v.length) { resolve(pickCantonese(v)); return; }
    let resolved = false;
    const done = (voice) => { if (!resolved) { resolved = true; resolve(voice); } };
    speechSynthesis.onvoiceschanged = () => done(pickCantonese(speechSynthesis.getVoices()));
    setTimeout(() => done(null), 3000);
  });
}
function pickCantonese(voices) {
  return voices.find(v => v.lang.startsWith('zh-HK') || v.lang.startsWith('yue')) || null;
}

function chunkText(text) {
  const chunks = []; let cur = '';
  for (const ch of text) {
    if (/\s/.test(ch)) {
      if (cur) { chunks.push(cur); cur = ''; }
    } else if (/[гҖӮпјҒпјҹпјҢгҖҒпјӣпјҡ\n\r]/.test(ch) && cur.length > 5) { cur += ch; chunks.push(cur); cur = ''; }
    else if (cur.length >= 60) { chunks.push(cur); cur = ch; }
    else { cur += ch; }
  }
  if (cur) chunks.push(cur);
  return chunks.length ? chunks : [text];
}

async function speak(text, rate = 1) {
  if (!text) return;
  stopSpeak();
  const parts = chunkText(text);
  statusBar.textContent = `рҹ”Ҡ ${parts.length}ж®ө: ${parts.join(' | ')}`;
  if (!('speechSynthesis' in window)) return speakOnline(text, rate);

  let voice = await resolveVoice();
  if (!voice) voice = await getCantoneseVoice();
  const vol = parseFloat(volumeRange.value);
  if (!voice && speechSynthesis.getVoices().length > 0) {
    voice = speechSynthesis.getVoices()[0];
  }
  if (!voice) return speakOnline(text, rate);

  for (let i = 0; i < parts.length; i++) {
    const ok = await speakOne(parts[i], rate, vol, voice, i, parts.length);
    if (!ok) break;
    if (i < parts.length - 1) await new Promise(r => setTimeout(r, 200));
  }
  statusBar.textContent = `вң… "${text}"`;
}

function speakOne(text, rate, vol, voice, idx, total) {
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-HK';
    u.rate = Math.max(0.1, Math.min(10, rate));
    u.volume = 1;
    u.voice = voice;
    currentUtterance = u;
    statusBar.textContent = `рҹ”Ҡ еҸ‘йҹідёӯ (${idx+1}/${total}): "${text}"`;
    u.onend = () => { currentUtterance = null; resolve(true); };
    u.onerror = (e) => { currentUtterance = null; console.warn('TTS error:', e.error || e.message || e); resolve(false); };
    window.speechSynthesis.speak(u);
    setTimeout(() => {
      if (currentUtterance) { currentUtterance = null; resolve(true); }
    }, Math.max(text.length * 120 / rate, 1500));
  });
}

async function speakOnline(text, rate = 1) {
  if (proxyAvailable !== false && (proxyAvailable || Date.now() > proxyRetryAt)) {
    const r = await tryFetchAudio(`${SPEECH_PROXY}?text=${encodeURIComponent(text)}`, rate);
    if (r) { proxyAvailable = true; return; }
    proxyAvailable = false;
    proxyRetryAt = Date.now() + 120000;
  }
  statusBar.textContent = 'в„№пёҸ еҪ“еүҚи®ҫеӨҮж— зІӨиҜӯиҜӯйҹіпјҢдё”еңЁзәҝеј•ж“ҺдёҚеҸҜз”Ё';
  if (isFileProtocol) showToast('иҝҗиЎҢ: python3 -m http.server 8080');
}

async function tryFetchAudio(url, rate) {
  try {
    const resp = await fetch(url, { referrerPolicy: 'unsafe-url' });
    if (!resp.ok) return null;
    const buf = await resp.arrayBuffer();
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') await ctx.resume();
    const audio = await ctx.decodeAudioData(buf);
    const src = ctx.createBufferSource();
    src.buffer = audio; src.playbackRate.value = rate;
    const vol = parseFloat(volumeRange.value);
    const gain = ctx.createGain(); gain.gain.value = Math.max(0, vol);
    src.connect(gain); gain.connect(ctx.destination);
    src.start(0); currentAudioSrc = src;
    return new Promise(r => { src.onended = () => { currentAudioSrc = null; r(true); }; });
  } catch (e) { return null; }
}

function stopSpeak() {
  if (currentUtterance) { window.speechSynthesis.cancel(); currentUtterance = null; }
  if (currentAudioSrc) { try { currentAudioSrc.stop(); } catch(e) {} currentAudioSrc = null; }
}

function splitSentences(text) {
  const sents = []; let cur = '';
  for (const ch of text) {
    cur += ch;
    if (/[гҖӮпјҒпјҹ.!?\n\r]/.test(ch) && cur.trim()) { sents.push(cur.trim()); cur = ''; }
  }
  if (cur.trim()) sents.push(cur.trim());
  return sents.length ? sents : [text];
}

function renderSentences(text) {
  const sents = splitSentences(text);
  segContainer.innerHTML = '';
  currentSentences = [];
  for (let si = 0; si < sents.length; si++) {
    const words = segmentText(sents[si]);
    currentSentences.push({ text: sents[si], words });
    const group = document.createElement('div');
    group.className = 'sgroup';
    const hdr = document.createElement('div');
    hdr.className = 'shdr';
    hdr.textContent = 'рҹ”Ҡ ' + sents[si];
    hdr.dataset.si = si;
    hdr.addEventListener('click', () => playSentence(si));
    hdr.addEventListener('touchend', (e) => { e.preventDefault(); playSentence(si); });
    group.appendChild(hdr);
    const tiles = document.createElement('div');
    tiles.className = 'stiles';
    for (let wi = 0; wi < words.length; wi++) {
      const w = words[wi];
      const el = document.createElement('span');
      el.className = 'segment ' + w.type;
      if (w.type === 'space') { el.innerHTML = '&nbsp;'; }
      else if (showJyutping && w.type !== 'punct' && w.type !== 'space') {
        const jp = getJyutpingForWord(w);
        el.innerHTML = `<span class="ch">${w.text}</span>${jp ? `<span class="jp">${jp}</span>` : ''}`;
      }
      else { el.textContent = w.text; }
      if (w.type !== 'punct' && w.type !== 'space') {
        el.dataset.si = si; el.dataset.wi = wi;
        el.addEventListener('click', () => playWord(si, wi));
        el.addEventListener('touchend', (e) => { e.preventDefault(); playWord(si, wi); });
      }
      tiles.appendChild(el);
    }
    group.appendChild(tiles);
    segContainer.appendChild(group);
  }
}

function clearHighlight() {

async function playSentence(si) {
  const s = currentSentences[si];
  if (!s) return;
  stopSpeak(); clearHighlight();
  const groups = segContainer.querySelectorAll('.sgroup');
  if (groups[si]) groups[si].classList.add('active');
  const hdrs = segContainer.querySelectorAll('.shdr');
  if (hdrs[si]) hdrs[si].classList.add('playing');
  await speak(s.text, parseFloat(speedRange.value));
}

async function playWord(si, wi) {
  const s = currentSentences[si];
  if (!s || !s.words[wi]) return;
  const w = s.words[wi];
  if (w.type === 'punct' || w.type === 'space') return;
  stopSpeak(); clearHighlight();
  const groups = segContainer.querySelectorAll('.sgroup');
  if (groups[si]) groups[si].classList.add('active');
  const tiles = groups[si]?.querySelectorAll('.segment');
  if (tiles?.[wi]) tiles[wi].classList.add('playing');
  await speak(w.text, parseFloat(speedRange.value));
}

function addHistory(orig, translated) {
  let hist = JSON.parse(localStorage.getItem('yueHistory') || '[]');
  const idx = hist.findIndex(h => h.text === orig);
  if (idx >= 0) {
    hist[idx].translated = translated;
    hist[idx].time = Date.now();
    const item = hist.splice(idx, 1)[0];
    hist.unshift(item);
  } else {
    hist.unshift({ text: orig, translated, time: Date.now() });
  }
  if (hist.length > 50) hist = hist.slice(0, 50);
  localStorage.setItem('yueHistory', JSON.stringify(hist));
}

      renderSentences(h.translated || h.text);
      historyModal.classList.remove('show');
      showToast('е·ІеҠ иҪҪ');
    });
    historyList.appendChild(div);
  }
}

historyBtn.addEventListener('click', () => {
  renderHistory();
  historyModal.classList.add('show');
});
closeHistoryBtn.addEventListener('click', () => historyModal.classList.remove('show'));
historyModal.addEventListener('click', (e) => {
  if (e.target === historyModal) historyModal.classList.remove('show');
});
clearHistoryBtn.addEventListener('click', () => {
  localStorage.removeItem('yueHistory');
  renderHistory();
  showToast('еҺҶеҸІе·Іжё…з©ә');
});

if ('serviceWorker' in navigator) {
  // PWA-ready
}

}
